name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:coverage
        continue-on-error: true

  e2e:
    name: end-to-end (real downstream)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run e2e
        env:
          RUN_E2E: '1'
        run: npm run test:e2e
